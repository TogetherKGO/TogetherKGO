<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TogetherKGO - Community Food Resources</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div id="google_translate_element" style="display:none;"></div>

    <div class="home">
        <!-- Left: Green hero with circle -->
        <div class="hero-green">
            <div class="circle">
                <div class="circle-text">Together<br>KGO</div>
            </div>
        </div>

        <!-- Right: Content -->
        <div class="content">
            <div class="content-top">
                <!-- Find Supports & Services -->
                <div class="find-section">
                    <h1 class="find-heading"><a href="find-services.html">Find Supports <br>&amp; Services</a></h1>
                    <div class="tags" id="serviceTags">
                        <!-- Populated from constants.js -->
                    </div>
                </div>

                <!-- Navigation links -->
                <nav class="nav-links-home">
                    <a href="community.html">Community Board</a>
                    <a href="resources.html">Resources</a>
                    <div class="lang-section">
                        <span class="lang-label" onclick="document.getElementById('languageTags').classList.toggle('show')">Languages</span>
                        <div class="tags lang-tags" id="languageTags">
                            <!-- Populated from constants.js -->
                        </div>
                    </div>
                    <a href="about.html">About &amp; FAQ</a>
                </nav>
            </div>

            <!-- Bottom tagline -->
            <p class="tagline">Supporting a more connected, coordinated and resilient community in Kingston-Galloway Orton-Park</p>
        </div>
    </div>

    <!-- Load constants first -->
    <script src="assets/constants.js"></script>

    <!-- Build tags from constants -->
    <script>
        // Render service tags from constants
        (function() {
            var container = document.getElementById('serviceTags');
            var tags = window.CONSTANTS.HOME_TAGS;
            Object.keys(tags).forEach(function(key) {
                var a = document.createElement('a');
                a.href = 'find-services.html?tag=' + key;
                a.className = 'tag';
                a.textContent = tags[key];
                container.appendChild(a);
            });
        })();

        // Render language tags from constants
        (function() {
            var container = document.getElementById('languageTags');
            var langs = window.CONSTANTS.LANGUAGES;
            Object.keys(langs).forEach(function(code) {
                var a = document.createElement('a');
                a.href = '#';
                a.className = 'tag tag-lang';
                a.textContent = langs[code];
                a.onclick = function(e) {
                    e.preventDefault();
                    changeLanguage(code);
                };
                container.appendChild(a);
            });
        })();
    </script>

    <!-- Translation Script -->
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement(
                { pageLanguage: 'en', autoDisplay: false },
                'google_translate_element'
            );
        }

        function setGoogTransCookie(lang) {
            const value = '/en/' + lang;
            document.cookie = 'googtrans=' + value + '; path=/';
            document.cookie = 'googtrans=' + value + '; path=/; domain=' + location.hostname;
        }

        function changeLanguage(langCode) {
            if (langCode === 'en') {
                clearGoogleTranslateCookies();
                setGoogTransCookie('en');
            } else {
                setGoogTransCookie(langCode);
            }
            window.location.reload();
        }

        function clearGoogleTranslateCookies() {
            document.cookie.split(';').forEach(function(cookie) {
                var name = cookie.split('=')[0].trim();
                if (name.includes('googtrans') || name.includes('_ga') || name.includes('_gid')) {
                    document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                    document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.translate.google.com;';
                    document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + window.location.hostname + ';';
                }
            });
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
