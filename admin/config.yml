backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/posts"
public_folder: "/assets/images/posts"

publish_mode: editorial_workflow

collections:
  # !!! COMMUNITY BOARD POSTS !!!
- name: "community_posts"
  label: "Community Posts"
  label_singular: "Community Post"
  folder: "data/posts"
  create: true
  slug: "{{year}}-{{month}}-{{day}}-{{post.title | slugify}}" #this determines file names
  extension: "json"
  format: "json"
  summary: "{{post.title}} — {{post.type}}" # this is what admins will see 

  fields:

  # ORGANIZATION
  - label: "Organization"
    name: "organization"
    widget: "object"
    fields:
      - label: "Service Provider"
        name: "foodBankId"
        widget: "relation"
        collection: "service_listings"
        search_fields: ["organization.name"] #same data ref changes
        value_field: "organization.id"
        display_fields: ["organization.name"]
        required: true
        hint: "Select an existing service if available."

      - label: "Enter Name (if selecting Other)"
        name: "foodBankOther"
        widget: "string"
        required: false
        hint: "Type the organization/service/individual name if it is not in the list above."

  # CORE POST CONTENT
  - label: "Core Post Details"
    name: "post"
    widget: "object"
    fields:

      - label: "Post Type"
        name: "type"
        widget: "select"
        default: "update"
        options:
          - { label: "General Update", value: "update" }
          - { label: "Urgent Notice", value: "urgent" }
          - { label: "Special Event", value: "event" }
          - { label: "Recurring Event", value: "recurring_event" }
          - { label: "Food Available Today", value: "food_available" }

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Short descriptive title"

      - label: "Message"
        name: "message"
        widget: "text"
        hint: "Detailed message about the update"
      
      # CONTACT
      - label: "Public Contact Info"
        name: "contactInfo"
        widget: "string"
        required: false
        hint: "Phone or email that can be shown publicly"

      # DATES
      - label: "Published Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: "Expiration Date"
        name: "expiresDate"
        widget: "datetime"
        required: true

  # Location Information
  - label: "Location Information"
    name: "location"
    widget: "object"
    fields:

      # LOCATION
      - label: "Location"
        name: "location"
        widget: "string"
        required: false
        conditional:
          field: type
          values: ["event", "recurring_event", "food_available"]

  # Singular Event
  - label: "Unique Event"
    name: "uniqueEvent"
    widget: "object"
    fields:
      # EVENT
      - label: "Event Date"
        name: "eventDate"
        widget: "datetime"
        required: false
        conditional:
          field: type
          value: "event"

  # Recurring Event
  - label: "Recurring Event"
    name: "recurringEvent"
    widget: "object"
    fields:
      # RECURRING EVENTS
      - label: "Start Date for Recurring Events"
        name: "startRecurringDates"
        widget: "datetime"
        required: false
        hint: "Provide the starting date for this recurring event"
        conditional:
          field: type
          value: "recurring_event"

      - label: "Recurring Schedule"
        name: "recurringDates"
        widget: "string"
        hint: "Example: Every Monday & Thursday 2-4pm"
        required: false
        conditional:
          field: type
          value: "recurring_event"

  # Food Event
  - label: "Food"
    name: "food"
    widget: "object"
    fields:
      # FOOD AVAILABLE
      - label: "Time Window"
        name: "timeWindow"
        widget: "string"
        required: false
        conditional:
          field: type
          value: "food_available"

      - label: "Available Items"
        name: "availableItems"
        widget: "string"
        required: false
        conditional:
          field: type
          value: "food_available"

# !!! ADD SERVICES LISTINGS - COLLECTION CONFIG !!!
- name: "service_listings"
  label: "Service Listings"
  label_singular: "Service Listing"
  folder: "data/services"
  create: true
  slug: "{{organization.name | slugify}}"   # generates filename based on name
  extension: "json"
  format: "json"
  identifier_field: "organization.name"
  summary: "{{organization.name}} - {{organization.type}}" #summary shown for CMS
  fields:
    - label: "Organization Information"
      name: "organization"
      widget: "object"
      fields:
      # 1️⃣ Name first so slug works and create-new works
        - label: "Organization Name"
          name: "name"
          widget: "string"
          required: true
          hint: "Full name of the organization"

        # 2️⃣ Optional unique ID, auto-generated if left blank
        - label: "Unique ID"
          name: "id"
          widget: "string"
          required: false
          hint: "Optional. Auto-generated on save if left blank"

        # 3️⃣ Type of organization
        - label: "Organization Type"
          name: "type"
          widget: "select"
          required: true
          options:
            - { label: "Community Organization", value: "community_org" }
            - { label: "Grassroots Organization", value: "grassroots_org" }
            - { label: "City of Toronto", value: "city_of_tor" }
            - { label: "Community Institution", value: "community_inst" }
            - { label: "Individual", value: "individual" }

        # 4️⃣ Description
        - label: "Description"
          name: "description"
          widget: "text"
          required: false
          hint: "Describe the services your organization provides"

        # 5️⃣ Address 
        - label: "Full Address"
          name: "address"
          widget: "string"
          required: true
          hint: "Include street, city, province, postal code"

        # 6 Contact info
        - label: "Phone Number"
          name: "phone"
          widget: "string"
          required: false
          hint: "Main contact number (e.g., 416-XXX-XXXX)"

        - label: "Email Address"
          name: "email"
          widget: "string"
          required: false
          hint: "Contact email (optional)"

        - label: "Website"
          name: "website"
          widget: "string"
          required: false
          hint: "Organization website URL (optional)"

        # 7 Tags / services
        - label: "Services/Tags"
          name: "tags"
          widget: "select"
          multiple: true
          required: false
          options:
            - { label: "Food Bank", value: "food_bank" }
            - { label: "Hot Meals", value: "hot_meals" }
            - { label: "Community Support", value: "community_support" }
            - { label: "Youth Programs", value: "youth_programs" }
            - { label: "Family Support", value: "family_support" }
            - { label: "Health Services", value: "health_services" }
            - { label: "Social Services", value: "social_services" }
            - { label: "Housing Support", value: "housing_support" }

    # FOR MAP ASSIGNMENT
    - label: "For Mapping"
      name: "location"
      widget: "object"
      fields:
        - label: "Latitude"
          name: "lat"
          widget: "number"
          value_type: "float"
          step: 0.0001
          required: true
          hint: "Use Google Maps to find coordinates"
        - label: "Longitude"
          name: "lng"
          widget: "number"
          value_type: "float"
          step: 0.0001
          required: true
          hint: "Use Google Maps to find coordinates"

    # Operating Days & hours
    - label: "Operating Hours"
      name: "hours"
      widget: "object"
      fields:
        - { label: "Monday", name: "mon", widget: "object", hint: "format = 2:00pm - If there are multiple open and closes each day please write each time separated by a comma ',', i.e., in open 10:00am,2:00pm and in close 12:00pm,4:00pm", fields: [ {label: "Open", name: "open", widget: "string", required: false}, {label: "Close", name: "close", widget: "string", required: false} ] }
        - { label: "Tuesday", name: "tue", widget: "object", fields: [ {label: "Open", name: "open", widget: "string", required: false}, {label: "Close", name: "close", widget: "string", required: false} ] }
        - { label: "Wednesday", name: "wed", widget: "object", fields: [ {label: "Open", name: "open", widget: "string", required: false}, {label: "Close", name: "close", widget: "string", required: false} ] }
        - { label: "Thursday", name: "thu", widget: "object", fields: [ {label: "Open", name: "open", widget: "string", required: false}, {label: "Close", name: "close", widget: "string", required: false} ] }
        - { label: "Friday", name: "fri", widget: "object", fields: [ {label: "Open", name: "open", widget: "string", required: false}, {label: "Close", name: "close", widget: "string", required: false} ] }
        - { label: "Saturday", name: "sat", widget: "object", fields: [ {label: "Open", name: "open", widget: "string", required: false}, {label: "Close", name: "close", widget: "string", required: false} ] }
        - { label: "Sunday", name: "sun", widget: "object", fields: [ {label: "Open", name: "open", widget: "string", required: false}, {label: "Close", name: "close", widget: "string", required: false} ] }

    # 10️⃣ Accessibility & Languages
    - label: "Requirements, Eligibility, Accessibility, Languages"
      name: "requirements"
      widget: "object"
      fields:
        - label: "Languages Supported"
          name: "languages_spoken"
          widget: "string"
          required: false
        - label: "Accessibility Information"
          name: "accessibility_info"
          widget: "text"
          required: false
        - label: "Documents Required"
          name: "documents_required"
          widget: "string"
          required: false
        - label: "Fees"
          name: "fees"
          widget: "string"
          required: false
        - label: "Eligibility"
          name: "eligibility"
          widget: "text"
          required: false

# Resource Listing collection

- name: "resources"
  label: "Resources"
  label_singular: "Resource"
  folder: "data/resources"
  create: true
  slug: "{{resource.title | slugify}}"
  extension: "json"
  format: "json"
  identifier_field: "resource.title"
  summary: "{{resource.title}} - {{resource.type}}"

  fields:
    - label: "Resource Information"
      name: "resource"
      widget: "object"
      fields:
        - label: "Resource Title"
          name: "title"
          widget: "string"
          required: true

        - label: "Unique ID"
          name: "id"
          widget: "string"
          required: false
          hint: "Optional. Auto-generated later if left blank"

        - label: "Organization / Program Name"
          name: "organization"
          widget: "string"
          required: true

        - label: "Resource Type"
          name: "type"
          widget: "select"
          required: true
          options:
            - { label: "Grant / Funding", value: "grant" }
            - { label: "General", value: "general" }
            - { label: "Education / Library", value: "education_library" }
            - { label: "Tax / Finance", value: "tax_finance" }
            - { label: "Microgrant", value: "microgrant" }
            - { label: "Directory / Resource List", value: "directory" }
            - { label: "Toolkit / Guide", value: "toolkit" }
            - { label: "Certification / Subsidy Support", value: "certification_support" }
            - { label: "Training / Workshop", value: "training" }
            - { label: "Community Program", value: "program" }
            - { label: "Greening / Environmental Support", value: "greening" }
            - { label: "Other", value: "other" }

        - label: "Description"
          name: "description"
          widget: "text"
          required: true

        - label: "Primary Link"
          name: "website"
          widget: "string"
          required: true

        - label: "Additional Link"
          name: "additional_link"
          widget: "string"
          required: false

    - label: "Coverage"
      name: "coverage"
      widget: "object"
      fields:
        - label: "Region Served"
          name: "region_served"
          widget: "select"
          required: true
          options:
            - { label: "Toronto", value: "toronto" }
            - { label: "Other", value: "other" }

    - label: "Requirements and Details"
      name: "requirements"
      widget: "object"
      fields:
        - label: "Eligibility"
          name: "eligibility"
          widget: "text"
          required: false

        - label: "Fees"
          name: "fees"
          widget: "string"
          required: false

        - label: "Documents Required"
          name: "documents_required"
          widget: "text"
          required: false

    - label: "Resource Contact Information"
      name: "contact"
      widget: "object"
      fields:
        - label: "Public Contact Email"
          name: "email"
          widget: "string"
          required: false

        - label: "Public Contact Phone"
          name: "phone"
          widget: "string"
          required: false

    - label: "Tags and Notes"
      name: "meta"
      widget: "object"
      fields:
        - label: "Tags"
          name: "tags"
          widget: "select"
          multiple: true
          required: false
          options:
            - { label: "General", value: "general" }
            - { label: "Funding", value: "funding" }
            - { label: "Grants", value: "grants" }
            - { label: "Education & Library", value: "education_library" }
            - { label: "Tax & Finance", value: "tax_finance" }
            - { label: "Toolkits", value: "toolkits" }
            - { label: "Directory", value: "directory" }
            - { label: "Certification Support", value: "certification_support" }
            - { label: "Subsidy", value: "subsidy" }
            - { label: "Greening", value: "greening" }
            - { label: "Community Building", value: "community_building" }
            - { label: "Other", value: "other" }

        - label: "Additional Notes"
          name: "additional_notes"
          widget: "text"
          required: false